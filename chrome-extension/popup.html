<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 300px;
        padding: 16px;
        font-family: Arial, sans-serif;
        background: #f9f9f9;
      }

      h2 {
        font-size: 16px;
        margin-bottom: 12px;
        color: #333;
      }

      #original-url {
        font-size: 11px;
        color: #666;
        word-break: break-all;
        margin-bottom: 12px;
        background: #eee;
        padding: 6px;
        border-radius: 4px;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
      }

      button:hover {
        background: #4338ca;
      }

      #result {
        margin-top: 12px;
        display: none;
      }

      #short-url {
        font-size: 13px;
        color: #4f46e5;
        word-break: break-all;
        background: #eef2ff;
        padding: 8px;
        border-radius: 4px;
        cursor: pointer;
      }

      #copy-msg {
        font-size: 11px;
        color: green;
        margin-top: 4px;
        display: none;
      }

      #error {
        margin-top: 12px;
        color: red;
        font-size: 12px;
        display: none;
      }
    </style>
  </head>
  <body>
    <h2>🔗 URL Shortener</h2>

    <div id="original-url">Loading current page...</div>

    <button id="shorten-btn">Shorten This URL</button>

    <div id="result">
      <div id="short-url"></div>
      <div id="copy-msg">✅ Copied to clipboard!</div>
    </div>

    <div id="error"></div>

    <script src="popup.js"></script>
  </body>
</html>
