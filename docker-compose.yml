version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: url_shortener_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: urlshortener
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: url_shortener_app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_USER: admin
      DB_PASSWORD: password
      DB_NAME: urlshortener
      DB_PORT: 5432
    depends_on:
      - postgres

volumes:
  pgdata: